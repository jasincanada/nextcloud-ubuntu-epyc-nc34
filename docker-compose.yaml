# Nextcloud 34 Testbed — Ubuntu Server / AMD EPYC
# Prometheus and Grafana run on the host — no bundled observability stack.
# Exporters listen on host ports so the existing Prometheus can scrape them.

services:
  nextcloud:
    image: nextcloud:34
    container_name: nextcloud-nc34
    ports:
      - "8081:80"
    environment:
      - POSTGRES_HOST=pgbouncer
      - POSTGRES_PORT=6432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=${NEXTCLOUD_TRUSTED_DOMAINS}
      - REDIS_HOST=redis
      - PHP_MEMORY_LIMIT=4G
      - PHP_UPLOAD_LIMIT=50G
      - OVERWRITEHOST=${NC_DOMAIN}
      - OVERWRITEPROTOCOL=http
      - TRUSTED_PROXIES=172.18.0.0/16
    volumes:
      - nextcloud-app:/var/www/html
      - nextcloud-userdata:/var/www/html/data
      - ./custom.ini:/usr/local/etc/php/conf.d/zzz-custom.ini:ro
    depends_on:
      pgbouncer:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nextcloud-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/status.php"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 180s

  nextcloud-ai-worker-1:
    image: nextcloud:34
    restart: unless-stopped
    environment:
      - OMP_NUM_THREADS=4
      - OPENBLAS_NUM_THREADS=4
    volumes:
      - nextcloud-app:/var/www/html
      - nextcloud-userdata:/var/www/html/data
    command: php /var/www/html/occ background-job:worker 'OC\TaskProcessing\SynchronousBackgroundJob'
    depends_on:
      - nextcloud
      - db
      - redis
    networks:
      - nextcloud-network

  nextcloud-ai-worker-2:
    image: nextcloud:34
    restart: unless-stopped
    environment:
      - OMP_NUM_THREADS=4
      - OPENBLAS_NUM_THREADS=4
    volumes:
      - nextcloud-app:/var/www/html
      - nextcloud-userdata:/var/www/html/data
    command: php /var/www/html/occ background-job:worker 'OC\TaskProcessing\SynchronousBackgroundJob'
    depends_on:
      - nextcloud
      - db
      - redis
    networks:
      - nextcloud-network

  nextcloud-ai-worker-3:
    image: nextcloud:34
    restart: unless-stopped
    environment:
      - OMP_NUM_THREADS=4
      - OPENBLAS_NUM_THREADS=4
    volumes:
      - nextcloud-app:/var/www/html
      - nextcloud-userdata:/var/www/html/data
    command: php /var/www/html/occ background-job:worker 'OC\TaskProcessing\SynchronousBackgroundJob'
    depends_on:
      - nextcloud
      - db
      - redis
    networks:
      - nextcloud-network

  nextcloud-ai-worker-4:
    image: nextcloud:34
    restart: unless-stopped
    environment:
      - OMP_NUM_THREADS=4
      - OPENBLAS_NUM_THREADS=4
    volumes:
      - nextcloud-app:/var/www/html
      - nextcloud-userdata:/var/www/html/data
    command: php /var/www/html/occ background-job:worker 'OC\TaskProcessing\SynchronousBackgroundJob'
    depends_on:
      - nextcloud
      - db
      - redis
    networks:
      - nextcloud-network

  cron:
    image: nextcloud:34
    restart: unless-stopped
    volumes:
      - nextcloud-app:/var/www/html
      - nextcloud-userdata:/var/www/html/data
    entrypoint: /cron.sh
    depends_on:
      - db
      - redis
    networks:
      - nextcloud-network

  notify_push:
    image: nextcloud:34
    container_name: nextcloud-notify-push
    restart: unless-stopped
    ports:
      - "7867:7867"
    entrypoint: /var/www/html/custom_apps/notify_push/bin/x86_64/notify_push
    command:
      - --nextcloud-url=http://nextcloud:80
      - --port=7867
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB}
      - REDIS_URL=redis://redis/0
    volumes:
      - nextcloud-app:/var/www/html:ro
    depends_on:
      - nextcloud
      - redis
      - db
    networks:
      - nextcloud-network

  db:
    image: postgres:16-alpine
    shm_size: "2g"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    # Tuned for EPYC: high core count, large RAM. Adjust shared_buffers to ~25% of RAM.
    command: >
      postgres
      -c shared_buffers=16GB
      -c effective_cache_size=48GB
      -c max_connections=300
      -c work_mem=64MB
      -c maintenance_work_mem=2GB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=64MB
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c max_parallel_workers_per_gather=8
      -c max_parallel_workers=16
      -c dynamic_shared_memory_type=posix
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - nextcloud-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextcloud"]
      interval: 30s
      timeout: 10s
      retries: 3

  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    ports:
      - "5432:6432"
    environment:
      - DATABASES_HOST=db
      - DATABASES_PORT=5432
      - DATABASES_USER=${POSTGRES_USER}
      - DATABASES_PASSWORD=${POSTGRES_PASSWORD}
      - DATABASES_DBNAME=${POSTGRES_DB}
      - PGBOUNCER_POOL_MODE=session
      - PGBOUNCER_MAX_CLIENT_CONN=200
      - PGBOUNCER_DEFAULT_POOL_SIZE=25
      - PGBOUNCER_MIN_POOL_SIZE=5
      - PGBOUNCER_RESERVE_POOL_SIZE=5
      - PGBOUNCER_RESERVE_POOL_TIMEOUT=5
      - PGBOUNCER_SERVER_IDLE_TIMEOUT=300
      - PGBOUNCER_IGNORE_STARTUP_PARAMETERS=extra_float_digits
    networks:
      - nextcloud-network
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  redis:
    image: redis:7.2-alpine
    command: redis-server --maxmemory 8gb --maxmemory-policy allkeys-lru --save "" --appendonly no --tcp-backlog 511 --timeout 0 --tcp-keepalive 300
    restart: unless-stopped
    networks:
      - nextcloud-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  elasticsearch:
    image: elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms4g -Xmx4g
      - xpack.security.enabled=false
    volumes:
      - es-data:/usr/share/elasticsearch/data
    restart: unless-stopped
    networks:
      - nextcloud-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  collabora:
    image: collabora/code:latest
    container_name: nextcloud-collabora
    restart: unless-stopped
    ports:
      - "9980:9980"
    environment:
      - domain=${NC_DOMAIN}
      - username=admin
      - password=${COLLABORA_ADMIN_PASSWORD}
      - extra_params=--o:ssl.enable=false --o:ssl.termination=false --o:net.proto=IPv4
    cap_add:
      - MKNOD
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    networks:
      - nextcloud-network
    depends_on:
      - nextcloud

  # Metrics exporters — listen on host ports for existing Prometheus to scrape.
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
    ports:
      - "9187:9187"
    networks:
      - nextcloud-network
    restart: unless-stopped
    depends_on:
      - db

  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    environment:
      - REDIS_ADDR=redis:6379
    ports:
      - "9121:9121"
    networks:
      - nextcloud-network
    restart: unless-stopped
    depends_on:
      - redis

  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=7
    volumes:
      - postgres-backup-data:/backups
    restart: unless-stopped
    networks:
      - nextcloud-network
    depends_on:
      - db

  nextcloud-appapi-dsp:
    container_name: nextcloud-appapi-dsp
    image: tecnativa/docker-socket-proxy:latest
    environment:
      ALLOW_RESTARTS: "1"
      ALLOW_START: "1"
      ALLOW_STOP: "1"
      CONTAINERS: "1"
      IMAGES: "1"
      NETWORKS: "1"
      POST: "1"
      VOLUMES: "1"
      NC_HAPROXY_PASSWORD: "${APPAPI_DSP_PASSWORD}"
    networks:
      - nextcloud-network
    ports:
      - "2375:2375"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

volumes:
  nextcloud-app:
  nextcloud-userdata:
  db-data:
  es-data:
  postgres-backup-data:

networks:
  nextcloud-network:
    name: nextcloud-network
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1500"
